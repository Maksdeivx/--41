<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛР15</title>
</head>
<body>
    <h1>Объекты в JavaScript</h1>
    <h3>Примеры объектов:</h3>
    <p>Встроенные объекты. Например объект Math: Math.PI</p>
    <button onclick="Math_output()">Вывод</button>
    <p>Объекты, представленные в среде выполнения(в браузере). Например объект navigator выведет информацию о браузере и ОС:</p>
    <button onclick="DOM_output()">Вывод</button>
    <p>Пользовательские объекты. Например объект person, который имеет возраст и имя.</p>
    <button onclick="person_output()">Вывод</button>
</body>
<script src="script.js"></script>
</html>
